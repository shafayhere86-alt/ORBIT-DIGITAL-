  <text x="300" y="595" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#0F172A">EMPOWERING YOUR BUSINESS TO GROW.</text>
  <line x1="920" y1="580" x2="1050" y2="580" stroke="#38BDF8" stroke-width="3"/>
</svg>