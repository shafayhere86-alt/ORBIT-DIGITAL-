    <path d="M 200 300 Q 300 150 500 150 Q 700 150 800 300 Q 700 450 500 450 Q 300 450 200 300" fill="#38BDF8" opacity="0.9"/>
    <circle cx="800" cy="300" r="40" fill="#38BDF8"/>
  </g>
  
  <!-- D Letter (Dark Navy) -->
  <g id="d-letter">
    <path d="M 520 150 L 640 150 Q 750 150 750 300 Q 750 450 640 450 L 520 450 Z" fill="#0F172A" stroke="none"/>
