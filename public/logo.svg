  <!-- Dot (Bright Blue) -->
  <circle cx="820" cy="120" r="25" fill="#0EA5E9"/>
  
  <!-- Text -->
  <text x="100" y="550" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#0EA5E9">ORBIT</text>
  <text x="520" y="550" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#0F172A">DIGITAL</text>
  
  <!-- Tagline -->
